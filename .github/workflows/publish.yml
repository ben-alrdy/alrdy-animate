name: Publish to npm

# Release flow (Option A — CI owns publishing):
#   1. Locally:  npm version <prerelease|patch|minor|major> -m "chore: release v%s"
#      This bumps package.json, commits, and creates a v* tag.
#   2. Locally:  git push --follow-tags origin <branch>
#      Pushing the tag triggers this workflow.
#   3. CI runs build → publish with --provenance.
#      The dist-tag is derived from the version suffix:
#        -alpha.N / -beta.N / -rc.N → tag = "alpha" / "beta" / "rc"
#        no suffix                  → tag = "latest"
#
# Never run `npm publish` from a laptop — that races with this workflow and
# also produces an unsigned tarball (no provenance badge on npmjs.com).
# The precheck step below makes the workflow tolerant if it does happen
# (e.g. a manual republish), exiting clean instead of failing E403.

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v7.1.10

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for provenance and OIDC auth
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Fetch all history for proper versioning
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'  # Ships with npm 11, required for tokenless OIDC publish
          registry-url: 'https://registry.npmjs.org'

      - name: Verify npm configuration and OIDC
        run: |
          echo "npm version: $(npm --version)"
          echo "registry: $(npm config get registry)"
          echo "Node version: $(node --version)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL: ${ACTIONS_ID_TOKEN_REQUEST_URL:-not set}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+set}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Debug auth state
        run: |
          echo "--- npm whoami ---"
          npm whoami || echo "whoami failed"
          echo "--- npm config ---"
          npm config ls -l 2>&1 | grep -Ei 'registry|auth|scope|always' || true
          echo "--- cat .npmrc (if present) ---"
          cat ~/.npmrc 2>/dev/null | sed 's/_authToken=.*/_authToken=***/' || echo "no ~/.npmrc"

      - name: Skip if version already published
        id: precheck
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "alrdy-animate@$VERSION" version >/dev/null 2>&1; then
            echo "alrdy-animate@$VERSION is already on the registry — skipping publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with OIDC
        if: steps.precheck.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.precheck.outputs.version }}"
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            DIST_TAG="${BASH_REMATCH[1]}"
          else
            DIST_TAG="latest"
          fi
          echo "Publishing $VERSION to npm with --tag $DIST_TAG"
          npm publish --access public --provenance --tag "$DIST_TAG"
